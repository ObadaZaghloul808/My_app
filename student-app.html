<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>نظام النجاح</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a14; --bg2:#12121f; --bg3:#1a1a2e;
  --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.08);
  --red:#ff5757; --teal:#00d4aa; --yellow:#ffd166; --blue:#74b9ff; --purple:#a29bfe; --orange:#fd9644;
  --text:#f0f0f0; --text2:rgba(255,255,255,0.5); --text3:rgba(255,255,255,0.22);
  --font:'Tajawal',sans-serif; --r:16px; --safe:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
body{display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

/* HEADER */
#hdr{background:var(--bg3);border-bottom:1px solid var(--border);padding:14px 16px 0;flex-shrink:0;z-index:10}
#hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
#app-title{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--red),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#hdr-date{font-size:11px;color:var(--text3);margin-top:1px}
#streak{background:rgba(255,87,87,0.12);border:1px solid rgba(255,87,87,0.25);border-radius:10px;padding:6px 12px;font-size:12px;color:var(--red);font-weight:700}
#nav{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;padding-bottom:0}
#nav::-webkit-scrollbar{display:none}
.nb{padding:10px 13px;border:none;background:transparent;color:var(--text3);font-size:11.5px;font-weight:700;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;font-family:var(--font);border-radius:10px 10px 0 0;flex-shrink:0}
.nb.active{color:var(--red);border-bottom-color:var(--red);background:rgba(255,87,87,0.06)}

/* MAIN */
#main{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(24px + var(--safe))}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px}
.ct{font-size:15px;font-weight:800;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.ct .ic{font-size:18px}

/* BUTTONS */
.btn{border:none;border-radius:12px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s}
.btn:active{transform:scale(0.96)}
.btn-p{background:linear-gradient(135deg,var(--red),#ff8e53);color:#fff}
.btn-g{background:rgba(255,255,255,0.06);color:var(--text2);border:1px solid var(--border)}
.btn-t{background:rgba(0,212,170,0.12);color:var(--teal);border:1px solid rgba(0,212,170,0.25)}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:9px}

/* INPUTS */
input[type=text],input[type=number],textarea,select{
  background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;
  padding:10px 14px;color:var(--text);font-size:14px;font-family:var(--font);
  outline:none;direction:rtl;transition:border-color .2s;width:100%
}
input:focus,textarea:focus,select:focus{border-color:rgba(255,87,87,0.4)}
select option{background:#1a1a2e}
textarea{resize:none;min-height:80px;line-height:1.7}

/* CHECK ROW */
.crow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .2s}
.crow:last-child{border-bottom:none}
.crow.done{opacity:.4}
.cbox{width:22px;height:22px;border-radius:7px;flex-shrink:0;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s}
.cbox.ck{background:rgba(0,212,170,0.18);border-color:var(--teal);color:var(--teal)}

/* TAGS */
.tag{display:inline-block;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700}
.tr{background:rgba(255,87,87,0.15);color:var(--red)}
.ty{background:rgba(255,209,102,0.15);color:var(--yellow)}
.tt{background:rgba(0,212,170,0.15);color:var(--teal)}
.tb{background:rgba(116,185,255,0.15);color:var(--blue)}

/* STAT GRID */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sc{border-radius:14px;padding:14px;text-align:center;border:1px solid;cursor:pointer;transition:all .2s}
.sc:active{transform:scale(0.97)}
.sv{font-size:26px;font-weight:900;margin-bottom:2px}
.sl{font-size:11px;color:var(--text2)}

/* WATER */
#wcups{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0}
.cup{width:38px;height:46px;border-radius:0 0 11px 11px;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .2s;background:rgba(255,255,255,0.03)}
.cup.full{background:linear-gradient(180deg,rgba(116,185,255,0.3),rgba(9,132,227,0.25));border-color:var(--blue)}

/* POMODORO */
#pring{display:flex;justify-content:center;margin:8px 0}
#pring svg circle{transition:stroke-dashoffset 1s linear}
#ptime{font-size:38px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-1px}
#plabel{font-size:12px;color:var(--text2);margin-bottom:14px;text-align:center;font-weight:600}
#pbtns{display:flex;gap:10px;justify-content:center}

/* FOOD DB */
.fcat{margin-bottom:20px}
.fcat-title{font-size:13px;font-weight:800;color:var(--yellow);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid rgba(255,209,102,0.2)}
.fitem{background:rgba(255,255,255,0.03);border-radius:13px;padding:13px;margin-bottom:8px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.fitem.open{border-color:rgba(255,209,102,0.3);background:rgba(255,209,102,0.04)}
.fname{font-size:14px;font-weight:800;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.fmacros{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.fm{font-size:11px;background:rgba(255,255,255,0.06);padding:3px 8px;border-radius:6px;color:var(--text2)}
.fm strong{color:var(--text)}
.ftip{font-size:12px;color:rgba(0,212,170,0.75);line-height:1.6;margin-top:5px;display:none}
.fitem.open .ftip{display:block}
.fwarn{font-size:12px;color:rgba(255,87,87,0.75);line-height:1.6;margin-top:4px;display:none}
.fitem.open .fwarn{display:block}

/* SUBJECTS */
.subj-card{border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid;cursor:pointer}
.subj-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.subj-name{font-size:15px;font-weight:800}
.subj-note{font-size:12px;color:var(--text2);line-height:1.6}
.subj-acts{display:flex;gap:8px;margin-top:10px}

/* NOTES */
.ncard{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:10px;border-right:3px solid}
.ntop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.ntitle{font-size:14px;font-weight:800}
.ndate{font-size:10px;color:var(--text3)}
.nbody{font-size:13px;color:var(--text2);line-height:1.7}
.del{background:rgba(255,87,87,0.1);border:1px solid rgba(255,87,87,0.2);border-radius:8px;padding:4px 9px;color:var(--red);cursor:pointer;font-size:12px;font-family:var(--font)}

/* ENGLISH */
.eng-card{background:rgba(116,185,255,0.05);border:1px solid rgba(116,185,255,0.15);border-radius:14px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all .2s}
.eng-card.open{border-color:rgba(116,185,255,0.35);background:rgba(116,185,255,0.08)}
.eng-word{font-size:20px;font-weight:900;color:var(--blue);margin-bottom:2px;font-family:'DM Serif Display',serif}
.eng-pron{font-size:12px;color:var(--text3);margin-bottom:8px}
.eng-ar{font-size:14px;font-weight:700;margin-bottom:6px}
.eng-ex{font-size:13px;color:var(--text2);font-style:italic;line-height:1.6;display:none;margin-top:8px}
.eng-card.open .eng-ex{display:block}
.eng-tip{font-size:12px;color:rgba(0,212,170,0.8);display:none;margin-top:6px}
.eng-card.open .eng-tip{display:block}
.phrase-card{background:rgba(162,155,254,0.06);border:1px solid rgba(162,155,254,0.18);border-radius:13px;padding:14px;margin-bottom:10px}
.phrase-en{font-size:15px;font-weight:800;color:var(--purple);margin-bottom:4px}
.phrase-ar{font-size:13px;color:var(--text2);margin-bottom:6px}
.phrase-ex{font-size:12px;color:var(--text3);font-style:italic}

/* MODAL */
#mov{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:none;align-items:flex-end;justify-content:center}
#mov.open{display:flex}
#modal{background:#1a1a2e;border-radius:24px 24px 0 0;border:1px solid var(--border);border-bottom:none;padding:22px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding-bottom:calc(22px + var(--safe))}
#mt{font-size:17px;font-weight:800;margin-bottom:16px}
.mf{margin-bottom:12px}
.ml{font-size:12px;color:var(--text2);margin-bottom:6px;display:block;font-weight:600}
.cpick{display:flex;gap:8px;flex-wrap:wrap}
.cd{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
.cd.sel{border-color:#fff;transform:scale(1.12)}

/* PROG BAR */
.pb{background:rgba(255,255,255,0.08);border-radius:6px;height:6px;overflow:hidden;margin-top:8px}
.pf{height:100%;border-radius:6px;transition:width .4s ease}

/* WEEK ROW */
.wr{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.wr:last-child{border-bottom:none}
.wd{font-size:12px;font-weight:800;min-width:52px}
.wl{font-size:13px;color:var(--text2);flex:1}

/* FAB */
#fab{position:fixed;bottom:calc(22px + var(--safe));left:20px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--red),#ff8e53);border:none;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 8px 28px rgba(255,87,87,0.45);display:none;align-items:center;justify-content:center;z-index:50;transition:all .2s}
#fab:active{transform:scale(0.9)}
#fab.show{display:flex}

/* DIVIDER */
.div{height:1px;background:var(--border);margin:12px 0}
.tip-box{background:rgba(255,209,102,0.06);border:1px solid rgba(255,209,102,0.15);border-radius:12px;padding:12px 14px;font-size:13px;color:rgba(255,209,102,0.85);line-height:1.7}
.warn-box{background:rgba(255,87,87,0.06);border:1px solid rgba(255,87,87,0.15);border-radius:12px;padding:12px 14px;font-size:13px;color:rgba(255,87,87,0.85);line-height:1.7}
.info-box{background:rgba(0,212,170,0.06);border:1px solid rgba(0,212,170,0.15);border-radius:12px;padding:12px 14px;font-size:13px;color:rgba(0,212,170,0.85);line-height:1.7}
.section-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;margin-top:4px}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.page{animation:fadeIn .22s ease}
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-top">
    <div>
      <div id="app-title">⚡ نظام النجاح</div>
      <div id="hdr-date"></div>
    </div>
    <div id="streak">🔥 <span id="sc">1</span> يوم</div>
  </div>
  <div id="nav">
    <button class="nb active" onclick="go('dash')">🏠 الرئيسية</button>
    <button class="nb" onclick="go('nutrition')">🥗 التغذية</button>
    <button class="nb" onclick="go('fitness')">💪 التمارين</button>
    <button class="nb" onclick="go('study')">📚 الدراسة</button>
    <button class="nb" onclick="go('subjects')">🎓 موادي</button>
    <button class="nb" onclick="go('notes')">📝 ملاحظات</button>
    <button class="nb" onclick="go('english')">🇬🇧 English</button>
  </div>
</div>

<div id="main"></div>
<button id="fab" onclick="openFAB()">+</button>

<div id="mov" onclick="maybeCM(event)">
  <div id="modal">
    <div id="mt"></div>
    <div id="mb"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn btn-p" style="flex:1" onclick="submitModal()">حفظ ✓</button>
      <button class="btn btn-g" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<script>
// ══ HELPERS ══
const $ = id => document.getElementById(id);
const today = () => new Date().toISOString().slice(0,10);
const S = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
};

// ══ STATE ══
let page = 'dash';
let modalCB = null;
let pomo = {run:false,mode:'work',min:25,sec:0,iv:null};

const st = {
  tasks:       S.get('tasks',[{id:1,text:'مراجعة محاضرة اليوم',done:false,priority:'high'},{id:2,text:'حل تمارين الدوائر الكهربائية',done:false,priority:'high'},{id:3,text:'تمرين الجسم',done:false,priority:'medium'},{id:4,text:'قراءة ٢٠ دقيقة',done:false,priority:'low'}]),
  water:       S.get('w_'+today(),0),
  meals:       S.get('m_'+today(),[]),
  exDone:      S.get('ex_'+today(),{}),
  subjects:    S.get('subjects',[{id:1,name:'Java',color:'#ff5757',grade:'',notes:'محاضرة السبت والاثنين'},{id:2,name:'الدوائر الكهربائية',color:'#ffd166',grade:'',notes:'المختبر يوم الأربعاء'}]),
  notes:       S.get('notes',[]),
  streak:      S.get('streak',1),
  lastDay:     S.get('lastDay',''),
  pomoCycles:  S.get('pc_'+today(),0),
  engDone:     S.get('ed_'+today(),[]),
};

function save(k,v){st[k]=v;S.set(k,v)}
function saveDay(k,v){st[k]=v;S.set(k+'_'+today(),v)}

// ══ STREAK ══
function initStreak(){
  const t=today();
  if(st.lastDay!==t){
    const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
    st.streak=st.lastDay===yest?st.streak+1:1;
    S.set('streak',st.streak);S.set('lastDay',t);
  }
  $('sc').textContent=st.streak;
}

// ══ DATE HEADER ══
function setDate(){
  const d=new Date();
  const days=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const months=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  $('hdr-date').textContent=`${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

// ══ NAV ══
function go(p){
  page=p;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  const map={dash:0,nutrition:1,fitness:2,study:3,subjects:4,notes:5,english:6};
  document.querySelectorAll('.nb')[map[p]].classList.add('active');
  if(pomo.iv){clearInterval(pomo.iv);pomo.iv=null;pomo.run=false}
  const fab=$('fab');
  fab.classList.toggle('show',['dash','subjects','notes'].includes(p));
  const pages={dash:pageDash,nutrition:pageNutrition,fitness:pageFitness,study:pageStudy,subjects:pageSubjects,notes:pageNotes,english:pageEnglish};
  $('main').innerHTML=`<div class="page">${pages[p]()}</div>`;
  if(p==='study')initPomo();
}

function openFAB(){
  if(page==='dash'||page==='subjects')openAddSubject();
  else if(page==='notes')openAddNote();
}

// ══════════════════════════════
// DASHBOARD
// ══════════════════════════════
function pageDash(){
  const doneT=st.tasks.filter(t=>t.done).length;
  const w=todayWorkout();
  const doneEx=Object.values(st.exDone).filter(Boolean).length;
  const tips=['الاتساق أهم من الكمال — تقدم صغير كل يوم يبني إنساناً كبيراً.','النوم هو أقوى أداة تعلم. لا تقلل منه.','جسمك يبني العضلات والذاكرة أثناء النوم، ليس أثناء التمرين أو المذاكرة.','قارن نفسك بنفسك بالأمس فقط.','الماء والنوم والتمرين — ثلاثة أشياء مجانية تغير كل شيء.','طبق شيئاً واحداً تعلمته اليوم. المعرفة بلا تطبيق مجرد معلومة.','إذا كنت تسأل هل أبدأ — فالجواب نعم، ابدأ الآن.'];
  const tip=tips[new Date().getDay()%tips.length];
  return `
  <div class="sg">
    <div class="sc" style="background:rgba(255,87,87,0.08);border-color:rgba(255,87,87,0.2)" onclick="go('study')">
      <div class="sv" style="color:var(--red)">${doneT}/${st.tasks.length}</div>
      <div class="sl">✅ مهام اليوم</div>
    </div>
    <div class="sc" style="background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.2)" onclick="go('fitness')">
      <div class="sv" style="color:var(--teal)">${doneEx}/${w.exercises.length}</div>
      <div class="sl">💪 تمارين اليوم</div>
    </div>
    <div class="sc" style="background:rgba(116,185,255,0.08);border-color:rgba(116,185,255,0.2)" onclick="go('nutrition')">
      <div class="sv" style="color:var(--blue)">${st.water}/8</div>
      <div class="sl">💧 أكواب ماء</div>
    </div>
    <div class="sc" style="background:rgba(255,209,102,0.08);border-color:rgba(255,209,102,0.2)" onclick="go('study')">
      <div class="sv" style="color:var(--yellow)">${st.pomoCycles}</div>
      <div class="sl">🍅 دورات بومودورو</div>
    </div>
  </div>

  <div class="card">
    <div class="ct"><span class="ic">💡</span> نصيحة اليوم</div>
    <div class="tip-box">${tip}</div>
  </div>

  <div class="card">
    <div class="ct"><span class="ic">✅</span> مهامي اليوم</div>
    ${renderTasks(true)}
    <div style="display:flex;gap:8px;margin-top:12px">
      <input type="text" id="qt" placeholder="مهمة جديدة..." style="flex:1" onkeydown="if(event.key==='Enter')addQT()">
      <button class="btn btn-p" style="padding:10px 16px;font-size:18px" onclick="addQT()">+</button>
    </div>
  </div>

  <div class="card">
    <div class="ct"><span class="ic">📅</span> تمرين اليوم — ${w.day}</div>
    <div style="background:${w.color}22;border:1px solid ${w.color}44;border-radius:11px;padding:10px 14px;color:${w.color};font-weight:800;font-size:14px;margin-bottom:12px">${w.label}</div>
    ${w.exercises.map(e=>`
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:18px">${e.icon}</span>
        <span style="flex:1;font-size:14px">${e.name}</span>
        <span style="font-size:12px;color:var(--text3)">${e.sets}</span>
      </div>`).join('')}
  </div>

  ${st.subjects.length?`
  <div class="card">
    <div class="ct"><span class="ic">🎓</span> موادي الجامعية</div>
    ${st.subjects.map(s=>`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="width:10px;height:10px;border-radius:50%;background:${s.color};flex-shrink:0"></div>
        <span style="font-size:14px;font-weight:700;flex:1">${s.name}</span>
        ${s.grade?`<span class="tag tt">${s.grade}</span>`:''}
      </div>`).join('')}
  </div>`:''}`;
}

// ══════════════════════════════
// TASKS
// ══════════════════════════════
function renderTasks(compact=false){
  const pc={high:'var(--red)',medium:'var(--yellow)',low:'var(--teal)'};
  const pl={high:'عالي',medium:'متوسط',low:'منخفض'};
  const list=compact?st.tasks.slice(0,6):st.tasks;
  if(!list.length)return`<div style="text-align:center;color:var(--text3);padding:20px;font-size:14px">لا توجد مهام 🎯</div>`;
  return list.map(t=>`
    <div class="crow ${t.done?'done':''}" onclick="toggleTask(${t.id})">
      <div class="cbox ${t.done?'ck':''}" style="border-color:${pc[t.priority]}">${t.done?'✓':''}</div>
      <span style="flex:1;font-size:14px;${t.done?'text-decoration:line-through':''}">${t.text}</span>
      <span class="tag" style="background:${pc[t.priority]}22;color:${pc[t.priority]};margin-left:4px">${pl[t.priority]}</span>
      ${!compact?`<button class="del" onclick="event.stopPropagation();delTask(${t.id})">×</button>`:''}
    </div>`).join('');
}
function toggleTask(id){st.tasks=st.tasks.map(t=>t.id===id?{...t,done:!t.done}:t);S.set('tasks',st.tasks);go(page)}
function delTask(id){st.tasks=st.tasks.filter(t=>t.id!==id);S.set('tasks',st.tasks);go(page)}
function addQT(){const i=$('qt');if(!i||!i.value.trim())return;st.tasks.push({id:Date.now(),text:i.value.trim(),done:false,priority:'medium'});S.set('tasks',st.tasks);go(page)}

// ══ POMODORO ══
function initPomo(){
  updatePomoUI();
}
function updatePomoUI(){
  const c=$('pcirc'),tm=$('ptime'),lb=$('plabel'),pb=$('pbtn');
  if(!c)return;
  const total=pomo.mode==='work'?25*60:5*60;
  const elapsed=total-(pomo.min*60+pomo.sec);
  const circ=2*Math.PI*64;
  c.style.strokeDashoffset=circ*(1-elapsed/total);
  c.style.stroke=pomo.mode==='work'?'var(--red)':'var(--teal)';
  tm.textContent=`${String(pomo.min).padStart(2,'0')}:${String(pomo.sec).padStart(2,'0')}`;
  lb.textContent=pomo.mode==='work'?'⚡ وقت التركيز':'☕ وقت الراحة';
  if(pb)pb.textContent=pomo.run?'⏸ إيقاف':'▶ ابدأ';
}
function togglePomo(){
  if(pomo.run){clearInterval(pomo.iv);pomo.iv=null;pomo.run=false;updatePomoUI();return}
  pomo.run=true;
  pomo.iv=setInterval(()=>{
    if(pomo.sec>0)pomo.sec--;
    else if(pomo.min>0){pomo.min--;pomo.sec=59}
    else{
      clearInterval(pomo.iv);pomo.run=false;
      if(pomo.mode==='work'){
        const c=st.pomoCycles+1;saveDay('pomoCycles',c);
        pomo.mode='break';pomo.min=5;pomo.sec=0;
      }else{pomo.mode='work';pomo.min=25;pomo.sec=0}
    }
    updatePomoUI();
  },1000);
  updatePomoUI();
}
function resetPomo(){
  clearInterval(pomo.iv);pomo.iv=null;pomo.run=false;
  pomo.mode='work';pomo.min=25;pomo.sec=0;updatePomoUI();
}

      💡 <strong>نصيحة الخبراء:</strong> تعلم ٥ كلمات يومياً = ١٨٢٥ كلمة بالسنة. معظم المحادثات اليومية تستخدم أقل من ٣٠٠٠ كلمة. أنت أقرب مما تظن.
    </div>
  </div>

  <div class="card">
    <div class="ct"><span class="ic">📖</span> كلمات أساسية لطالب معلوماتية</div>
    <div style="color:var(--text2);font-size:12px;margin-bottom:14px">اضغط على أي كلمة لتفاصيلها وجملة مثال</div>
    ${ENG_WORDS.map((w,i)=>`
      <div class="eng-card" onclick="this.classList.toggle('open')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="eng-word">${w.word}</div>
            <div class="eng-pron">${w.pron}</div>
            <div class="eng-ar">${w.ar}</div>
          </div>
          <span style="color:var(--text3);font-size:14px">▾</span>
        </div>
        <div class="eng-ex">
          <div style="color:var(--blue);margin-bottom:4px;font-size:13px">"${w.ex}"</div>
          <div class="eng-tip">💡 ${w.tip}</div>
        </div>
      </div>`).join('')}
  </div>

  <div class="card">
    <div class="ct"><span class="ic">💬</span> جمل عملية للحياة الجامعية</div>
    <div style="color:var(--text2);font-size:12px;margin-bottom:14px">جمل جاهزة الاستخدام في المحاضرات والمواقف اليومية</div>
    ${ENG_PHRASES.map(p=>`
      <div class="phrase-card">
        <div style="display:flex;gap:8px;align-items:flex-start">
          <span style="font-size:20px">${p.icon}</span>
          <div style="flex:1">
            <div class="phrase-en">${p.en}</div>
            <div class="phrase-ar">${p.ar}</div>
            <div class="phrase-ex">${p.ex}</div>
          </div>
        </div>
      </div>`).join('')}
  </div>

  <div class="card">
    <div class="ct"><span class="ic">🎯</span> خطة التطور باللغة الإنجليزية</div>
    ${[
      ['الآن','تعلم ٥ كلمات يومياً من هذا القسم','١٠ دقائق — قبل النوم أو بعد الفطور'],
      ['الشهر الأول','اقرأ مقالة إنجليزية قصيرة أسبوعياً','BBC Learning English — مجاني وممتاز'],
      ['٣ أشهر','شاهد محتوى تقني بالإنجليزية','YouTube: CS50, Fireship, Traversy Media'],
      ['٦ أشهر','ابدأ التفكير بالإنجليزية','حدّث نفسك بالإنجليزية عند المذاكرة'],
      ['السنة الأولى','اكتب CV إنجليزي احترافي','الفرق بين فرصة وبدون فرصة في سوق العمل'],
    ].map(([t,g,n])=>`
      <div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
        <span class="tag tb" style="white-space:nowrap;align-self:flex-start">${t}</span>
        <div><div style="font-size:13px;font-weight:700">${g}</div><div style="font-size:12px;color:var(--text3);margin-top:2px">${n}</div></div>
      </div>`).join('')}
  </div>`;
}
